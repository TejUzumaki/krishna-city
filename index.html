<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anime City Sandbox</title>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: #87CEEB; width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0;
            overscroll-behavior: none; touch-action: none;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .ui-btn {
            position: absolute; 
            background: rgba(40, 40, 40, 0.4); 
            border: 2px solid rgba(255, 255, 255, 0.6); 
            border-radius: 50%; 
            color: white; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            pointer-events: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            transition: transform 0.08s, background 0.1s, border 0.2s; 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 20;
            width: 70px; height: 70px;
        }
        .ui-btn:active { transform: scale(0.90); background: rgba(120, 120, 120, 0.7); }
        .ui-btn svg { width: 60%; height: 60%; fill: white; pointer-events: none; }
        .ui-btn.active-toggle { background: rgba(0, 150, 255, 0.8); border-color: white; }
        .ui-btn.editing { border: 2px dashed #ffeb3b; background: rgba(255, 235, 59, 0.2); }

        #fs-btn { top: 20px; left: 20px; width: 45px; height: 45px; display: flex; }
        #toggle-btn { top: 20px; right: 20px; width: 45px; height: 45px; display: flex; }
        #edit-btn { top: 20px; left: 75px; width: 45px; height: 45px; display: flex; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 8px; height: 8px; background: rgba(255,255,255,0.7); border-radius: 50%;
            display: none; z-index: 5; box-shadow: 0 0 4px rgba(0,0,0,0.8);
        }

        #speedometer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: white; padding: 5px 15px; border-radius: 10px;
            font-size: 18px; font-weight: bold; display: none; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3); z-index: 20;
        }

        #cam-area { position: absolute; top: 0; right: 0; width: 60%; height: 100%; pointer-events: auto; display: block; z-index: 1; }
        
        #steering-wheel {
            position: absolute; bottom: 40px; right: 30px; width: 140px; height: 140px;
            border: 6px solid rgba(255,255,255,0.4); border-radius: 50%;
            background: rgba(0,0,0,0.2); display: none; pointer-events: auto; z-index: 15;
            touch-action: none;
        }
        #steering-inner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%;
        }
        #steering-spoke {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px;
        }

        #joystick-base {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 15;
            backdrop-filter: blur(4px);
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.6); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        /* Default Button Positions */
        #drive-btn { bottom: 40px; right: 190px; }
        #exit-btn { bottom: 200px; left: 40px; }
        
        #sprint-btn { bottom: 130px; right: 30px; }
        #jump-btn { bottom: 130px; right: 110px; }
        #punch-btn { bottom: 40px; right: 100px; }
        
        #gas-btn { bottom: 40px; left: 160px; }
        #brake-btn { bottom: 40px; left: 40px; }
        #boost-btn { bottom: 130px; left: 100px; }
        #horn-btn { bottom: 130px; left: 180px; }

        #edit-panel {
            position: absolute; top: 75px; left: 20px; width: 240px; 
            background: rgba(20, 20, 20, 0.8); color: white; padding: 15px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);
            display: none; z-index: 30; backdrop-filter: blur(4px);
        }
        #edit-panel h3 { margin: 0 0 10px 0; font-size: 16px; }
        #edit-panel label { font-size: 14px; display: block; margin-bottom: 10px; }
        #edit-panel input[type="range"] { width: 100%; }
        #edit-toggle-btn {
            width: 100%; padding: 8px; margin-top: 10px; background: #ff9800; color: white;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        #edit-toggle-btn.active { background: #f44336; }

        .dialogue-box {
            position: absolute; background: rgba(255, 255, 255, 0.9); color: black;
            padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: bold;
            transform: translate(-50%, -100%); pointer-events: none; white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: opacity 0.2s; z-index: 5;
            opacity: 0;
        }
        .dialogue-box::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.9) transparent transparent transparent;
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- GLOBALS ---
        let scene, camera, renderer;
        let player, car, npcs = [];
        let state = 'foot';
        let clock;
        let buildingColliders = [], houseBounds = [], gatheringPoints = [];
        let audioCtx, fistMesh, dirLight, hemiLight, sunMesh, carBrakeLights = [];
        let headlightCones = [];
        let dialogues = [];

        let joyVec = { x: 0, y: 0 };
        let camYaw = 0, camPitch = 0.2;
        let steerCurrentAngle = 0, steerLastAngle = 0;
        let isSprinting = false, isBoosting = false, isGas = false, isBrake = false;
        let punchTime = 0, isNight = false, playerVY = 0, isJumping = false;
        let npcApproaching = null, approachCooldown = 0;
        let walkDialogueTimer = 0, driveDialogueTimer = 0;

        let joyTouchId = null, lookTouchId = null, steerTouchId = null;
        let camLastX = 0, camLastY = 0;

        let uiEditMode = false;
        let dragTarget = null, dragOffsetX = 0, dragOffsetY = 0;

        const driveBtn = document.getElementById('drive-btn');
        const exitBtn = document.getElementById('exit-btn');
        const sprintBtn = document.getElementById('sprint-btn');
        const jumpBtn = document.getElementById('jump-btn');
        const punchBtn = document.getElementById('punch-btn');
        const gasBtn = document.getElementById('gas-btn');
        const brakeBtn = document.getElementById('brake-btn');
        const boostBtn = document.getElementById('boost-btn');
        const hornBtn = document.getElementById('horn-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const fsBtn = document.getElementById('fs-btn');
        const editBtn = document.getElementById('edit-btn');
        const editPanel = document.getElementById('edit-panel');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleVal = document.getElementById('scale-val');
        const editToggleBtn = document.getElementById('edit-toggle-btn');
        const camArea = document.getElementById('cam-area');
        const steeringWheel = document.getElementById('steering-wheel');
        const crosshair = document.getElementById('crosshair');
        const speedometer = document.getElementById('speedometer');
        const joyBase = document.getElementById('joystick-base');
        const joyKnob = document.getElementById('joystick-knob');

        const walkDialogues = ["Just walking around...", "What a nice city.", "Where is everyone?", "I should get a snack."];
        const driveDialogues = ["Need for speed!", "Out of my way!", "Vroom vroom!", "Traffic is crazy."];
        const npcTalkDialogues = ["Hey there!", "Nice weather.", "You new here?", "I'm late for class!"];
        const npcPunchDialogues = ["Ouch!", "Why I oughta...!", "Rude!", "I'll get you back!"];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 150, 400);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 600);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            scene.add(camera);
            clock = new THREE.Clock();

            setupLights();
            createWorld();
            createPlayer();
            createCar();
            spawnNPCs(15);
            setupControls();
            showFootUI(); 
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function showFootUI() {
            sprintBtn.style.display = 'flex'; jumpBtn.style.display = 'flex'; punchBtn.style.display = 'flex';
            crosshair.style.display = 'block'; camArea.style.display = 'block'; joyBase.style.display = 'block';
            exitBtn.style.display = 'none'; gasBtn.style.display = 'none'; brakeBtn.style.display = 'none';
            boostBtn.style.display = 'none'; hornBtn.style.display = 'none';
            steeringWheel.style.display = 'none'; speedometer.style.display = 'none'; driveBtn.style.display = 'none';
        }

        function showCarUI() {
            sprintBtn.style.display = 'none'; jumpBtn.style.display = 'none'; punchBtn.style.display = 'none';
            driveBtn.style.display = 'none'; crosshair.style.display = 'none'; camArea.style.display = 'none'; joyBase.style.display = 'none';
            exitBtn.style.display = 'flex'; gasBtn.style.display = 'flex'; brakeBtn.style.display = 'flex';
            boostBtn.style.display = 'flex'; hornBtn.style.display = 'flex';
            steeringWheel.style.display = 'block'; speedometer.style.display = 'block';
        }

        function enterFullscreen() {
            let el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        function playSound(freq, duration, type = 'sine', vol = 0.5) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            o.start(); o.stop(audioCtx.currentTime + duration);
        }

        function setupLights() {
            hemiLight = new THREE.HemisphereLight(0xffffff, 0x88aa66, 0.9); scene.add(hemiLight);
            dirLight = new THREE.DirectionalLight(0xfff4e6, 1.0); dirLight.position.set(80, 120, 50);
            dirLight.castShadow = true; dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.left = -120; dirLight.shadow.camera.right = 120; dirLight.shadow.camera.top = 120; dirLight.shadow.camera.bottom = -120; dirLight.shadow.camera.far = 400;
            scene.add(dirLight);
            let sunMat = new THREE.MeshBasicMaterial({ color: 0xfff59d, fog: false });
            sunMesh = new THREE.Mesh(new THREE.SphereGeometry(20, 8, 8), sunMat);
            sunMesh.position.set(100, 100, -150); scene.add(sunMesh);
        }

        function isInsideHouse(x, z) { for (let b of houseBounds) { if (x > b.min.x && x < b.max.x && z > b.min.z && z < b.max.z) return true; } return false; }

        function createWorld() {
            let ground = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), new THREE.MeshStandardMaterial({ color: 0x8fc03f }));
            ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
            let roadMat = new THREE.MeshStandardMaterial({ color: 0x555555 }), pathMat = new THREE.MeshStandardMaterial({ color: 0x999999 });
            let buildingColors = [0xffe5b4, 0xfdfd96, 0xc19a6b, 0xe2725b, 0xffffff, 0xfffacd], wallMat = new THREE.MeshStandardMaterial({ color: 0x424242 });
            let gridSize = 80, bSize = 30, cityLimit = 180;
            for (let x = -cityLimit; x <= cityLimit; x += gridSize) {
                for (let z = -cityLimit; z <= cityLimit; z += gridSize) {
                    let road = new THREE.Mesh(new THREE.BoxGeometry(gridSize - bSize, 0.2, gridSize - bSize), roadMat);
                    road.position.set(x, 0.1, z); road.receiveShadow = true; scene.add(road);
                    let path = new THREE.Mesh(new THREE.BoxGeometry(gridSize - bSize + 4, 0.4, gridSize - bSize + 4), pathMat);
                    path.position.set(x, 0.1, z); path.receiveShadow = true; scene.add(path);
                    if (Math.random() > 0.2) { createHouse(x, z, bSize, 10 + Math.random() * 25, buildingColors[Math.floor(Math.random() * buildingColors.length)]); } 
                    else { createTree(x + (Math.random()*10-5), z + (Math.random()*10-5)); if(Math.random() > 0.7) gatheringPoints.push(new THREE.Vector3(x, 0, z)); }
                }
            }
            for(let i=0; i<40; i++) { let tx = Math.random() * 300 - 150, tz = Math.random() * 300 - 150; if (!isInsideHouse(tx, tz)) createTree(tx, tz); }
            let wallH = 15, wallT = 5, wallL = cityLimit * 2 + 20, wallY = wallH / 2;
            let walls = [new THREE.Mesh(new THREE.BoxGeometry(wallL, wallH, wallT), wallMat), new THREE.Mesh(new THREE.BoxGeometry(wallL, wallH, wallT), wallMat), new THREE.Mesh(new THREE.BoxGeometry(wallT, wallH, wallL), wallMat), new THREE.Mesh(new THREE.BoxGeometry(wallT, wallH, wallL), wallMat)];
            walls[0].position.set(0, wallY, -cityLimit - 10); walls[1].position.set(0, wallY, cityLimit + 10);
            walls[2].position.set(cityLimit + 10, wallY, 0); walls[3].position.set(-cityLimit - 10, wallY, 0);
            walls.forEach(w => { scene.add(w); buildingColliders.push(new THREE.Box3().setFromObject(w)); });
        }

        function resolveCollisions(entity, radius) {
            let pos = entity.position;
            for (let i = 0; i < buildingColliders.length; i++) {
                let box = buildingColliders[i], center = box.getCenter(new THREE.Vector3());
                if (pos.distanceTo(center) > 40) continue; 
                let cx = Math.max(box.min.x, Math.min(pos.x, box.max.x)), cz = Math.max(box.min.z, Math.min(pos.z, box.max.z));
                let dx = pos.x - cx, dz = pos.z - cz, distSq = dx*dx + dz*dz;
                if (distSq < radius * radius) { let dist = Math.sqrt(distSq); if (dist === 0) { pos.x += radius; } else { let push = (radius - dist); pos.x += (dx/dist) * push; pos.z += (dz/dist) * push; } }
            }
        }

        function createDialogue(text, entity) {
            let el = document.createElement('div');
            el.className = 'dialogue-box'; el.innerText = text;
            document.getElementById('ui-layer').appendChild(el);

            setTimeout(() => { el.style.opacity = 1; }, 10);
        }

        function updateDialogues(dt) {
            let vec = new THREE.Vector3();
            for (let i = dialogues.length - 1; i >= 0; i--) {
                let d = dialogues[i]; d.time -= dt;
                if (d.time <= 0) { d.el.style.opacity = 0; setTimeout(() => { d.el.remove(); }, 200); dialogues.splice(i, 1); continue; }
                vec.copy(d.entity.position).add(new THREE.Vector3(0, 2.8, 0)); vec.project(camera);
                let x = (vec.x * 0.5 + 0.5) * window.innerWidth, y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
                d.el.style.left = x + 'px'; d.el.style.top = y + 'px'; d.el.style.opacity = (vec.z > 1) ? 0 : 1;
            }
        }

        // --- CONTROLS ---
        function bindActionBtn(id, onDown, onUp) {
            const el = document.getElementById(id);
            const down = (e) => {
                if (uiEditMode) return;
                e.preventDefault(); e.stopPropagation();
                if(onDown) onDown();
                window.addEventListener('touchend', up, {passive: false});
                window.addEventListener('touchcancel', up, {passive: false});
                window.addEventListener('mouseup', up);
            };
            const up = (e) => {
                if (uiEditMode) return;
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if(onUp) onUp();
                window.removeEventListener('touchend', up);
                window.removeEventListener('touchcancel', up);
                window.removeEventListener('mouseup', up);
            };
            el.addEventListener('touchstart', down, {passive: false});
            el.addEventListener('mousedown', down);
        }
        function bindToggleBtn(id, action) {
            const el = document.getElementById(id);
            const click = (e) => { if (uiEditMode && id !== 'edit-toggle-btn') return; e.preventDefault(); e.stopPropagation(); action(); };
            el.addEventListener('touchstart', click, {passive: false}); el.addEventListener('mousedown', click);
        }

        function setupControls() {
            bindToggleBtn('fs-btn', enterFullscreen);
            bindToggleBtn('toggle-btn', toggleDayNight);
            bindToggleBtn('drive-btn', () => toggleDrive());
            bindToggleBtn('exit-btn', () => toggleDrive());
            bindToggleBtn('horn-btn', () => playSound(440, 0.2, 'square', 0.3));
            bindToggleBtn('punch-btn', punch);
            bindToggleBtn('jump-btn', jump);
            
            // Sprint Toggle
            bindToggleBtn('sprint-btn', () => {
                isSprinting = !isSprinting;
                sprintBtn.classList.toggle('active-toggle', isSprinting);
            });
            
            // Gas & Brake
            bindActionBtn('gas-btn', () => isGas = true, () => isGas = false);
            bindActionBtn('brake-btn', () => isBrake = true, () => isBrake = false);
            bindActionBtn('boost-btn', () => isBoosting = true, () => isBoosting = false);

            // Edit Panel
            editBtn.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); editPanel.style.display = editPanel.style.display === 'block' ? 'none' : 'block'; }, {passive: false});
            editBtn.addEventListener('mousedown', (e) => { e.stopPropagation(); editPanel.style.display = editPanel.style.display === 'block' ? 'none' : 'block'; });
            
            scaleSlider.addEventListener('input', (e) => {
                let scale = e.target.value / 100; scaleVal.innerText = e.target.value;
                document.querySelectorAll('.ui-btn').forEach(btn => {
                    if (btn.id === 'fs-btn' || btn.id === 'toggle-btn' || btn.id === 'edit-btn') return;
                    let defaultSize = 70, newSize = defaultSize * scale;
                    btn.style.width = newSize + 'px'; btn.style.height = newSize + 'px';
                });
            });
            editToggleBtn.addEventListener('click', () => {
                uiEditMode = !uiEditMode;
                if (uiEditMode) {
                    editToggleBtn.innerText = "Save Layout"; editToggleBtn.classList.add('active');
                    document.querySelectorAll('.ui-btn').forEach(btn => {
                        if (btn.id === 'fs-btn' || btn.id === 'toggle-btn' || btn.id === 'edit-btn' || btn.style.display === 'none') return;
                        btn.classList.add('editing');
                    });
                } else {
                    editToggleBtn.innerText = "Enable Edit Mode"; editToggleBtn.classList.remove('active');
                    document.querySelectorAll('.ui-btn').forEach(btn => btn.classList.remove('editing'));
                }
            });

            // Global Touch Handlers
            window.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    let target = document.elementFromPoint(t.clientX, t.clientY);
                    if (!target) continue;

                    if (uiEditMode) {
                        if (target.closest('.ui-btn.editing')) {
                            dragTarget = target.closest('.ui-btn');
                            let rect = dragTarget.getBoundingClientRect();
                            dragOffsetX = t.clientX - rect.left; dragOffsetY = t.clientY - rect.top;
                            dragTarget.style.bottom = 'auto'; dragTarget.style.right = 'auto';
                            continue;
                        }
                    } else {
                        if (target.closest('#joystick-base') && joyTouchId === null && state === 'foot') { joyTouchId = t.identifier; handleJoyMove(t.clientX, t.clientY); } 
                        else if (target.closest('#steering-wheel') && steerTouchId === null && state === 'driving') { steerTouchId = t.identifier; let rect = steeringWheel.getBoundingClientRect(); steerLastAngle = Math.atan2(t.clientY - (rect.top + rect.height/2), t.clientX - (rect.left + rect.width/2)); } 
                        else if (target.closest('#cam-area') && lookTouchId === null && state === 'foot') { lookTouchId = t.identifier; camLastX = t.clientX; camLastY = t.clientY; }
                    }
                }
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (uiEditMode && dragTarget && t.identifier === 0) {
                        dragTarget.style.left = (t.clientX - dragOffsetX) + 'px'; dragTarget.style.top = (t.clientY - dragOffsetY) + 'px';
                    } else {
                        if (t.identifier === joyTouchId) handleJoyMove(t.clientX, t.clientY);
                        else if (t.identifier === steerTouchId) handleSteerMove(t.clientX, t.clientY);
                        else if (t.identifier === lookTouchId) handleLookMove(t.clientX, t.clientY);
                    }
                }
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.identifier === joyTouchId) { joyTouchId = null; joyVec = { x: 0, y: 0 }; joyKnob.style.left = '30px'; joyKnob.style.top = '30px'; } 
                    else if (t.identifier === steerTouchId) steerTouchId = null; 
                    else if (t.identifier === lookTouchId) lookTouchId = null;
                }
                if (uiEditMode) dragTarget = null;
            });

            // Mouse Fallbacks
            joyBase.addEventListener('mousedown', (e) => { if(!uiEditMode && state==='foot'){ joyTouchId = -1; handleJoyMove(e.clientX, e.clientY); } });
            window.addEventListener('mousemove', (e) => {
                if (uiEditMode && dragTarget) { dragTarget.style.left = (e.clientX - dragOffsetX) + 'px'; dragTarget.style.top = (e.clientY - dragOffsetY) + 'px'; return; }
                if (joyTouchId === -1) handleJoyMove(e.clientX, e.clientY);
                if (lookTouchId === -1 && state === 'foot') handleLookMove(e.clientX, e.clientY);
            });
            window.addEventListener('mouseup', () => { if (joyTouchId === -1) { joyTouchId = null; joyVec = { x: 0, y: 0 }; joyKnob.style.left = '30px'; joyKnob.style.top = '30px'; } lookTouchId = null; if(uiEditMode) dragTarget = null; });
            camArea.addEventListener('mousedown', (e) => { if(state === 'foot' && !uiEditMode){ lookTouchId = -1; camLastX = e.clientX; camLastY = e.clientY; } });
            document.querySelectorAll('.ui-btn').forEach(btn => {
                btn.addEventListener('mousedown', (e) => {
                    if (uiEditMode && btn.classList.contains('editing')) {
                        dragTarget = btn; let rect = btn.getBoundingClientRect();
                        dragOffsetX = e.clientX - rect.left; dragOffsetY = e.clientY - rect.top;
                        btn.style.bottom = 'auto'; btn.style.right = 'auto';
                    }
                });
            });
        }

        function handleJoyMove(cx, cy) { let rect = joyBase.getBoundingClientRect(); let dx = cx - (rect.left + rect.width / 2), dy = cy - (rect.top + rect.height / 2); let dist = Math.sqrt(dx*dx + dy*dy), maxDist = rect.width / 2; if (dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; } joyKnob.style.left = (30 + dx) + 'px'; joyKnob.style.top = (30 + dy) + 'px'; joyVec.x = dx/maxDist; joyVec.y = dy/maxDist; }
        function handleLookMove(cx, cy) { let dx = cx - camLastX, dy = cy - camLastY; camLastX = cx; camLastY = cy; camYaw -= dx * 0.005; camPitch -= dy * 0.005; camPitch = Math.max(-1.2, Math.min(1.2, camPitch)); }
        function handleSteerMove(cx, cy) { let rect = steeringWheel.getBoundingClientRect(); let dx = cx - (rect.left + rect.width/2), dy = cy - (rect.top + rect.height/2); let angle = Math.atan2(dy, dx); let delta = angle - steerLastAngle; if (delta > Math.PI) delta -= Math.PI*2; if (delta < -Math.PI) delta += Math.PI*2; steerCurrentAngle += delta; steerCurrentAngle = Math.max(-Math.PI/2, Math.min(Math.PI/2, steerCurrentAngle)); steerLastAngle = angle; steeringWheel.style.transform = `rotate(${steerCurrentAngle}rad)`; }

        function toggleDayNight() {
            isNight = !isNight;
            if (isNight) { scene.background = new THREE.Color(0x0a0a20); scene.fog.color = new THREE.Color(0x0a0a20); hemiLight.intensity = 0.3; dirLight.intensity = 0.4; sunMesh.material.color.set(0xffffff); headlightCones.forEach(c => c.visible = true); } 
            else { scene.background = new THREE.Color(0x87CEEB); scene.fog.color = new THREE.Color(0x87CEEB); hemiLight.intensity = 0.9; dirLight.intensity = 1.0; sunMesh.material.color.set(0xfff59d); headlightCones.forEach(c => c.visible = false); }
        }

        function toggleDrive() {
            if (state === 'foot') { if (player.position.distanceTo(car.position) < 8) { state = 'driving'; showCarUI(); } } 
            else { state = 'foot'; let exitPos = new THREE.Vector3(2.5, 0, 0); exitPos.applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y); player.position.copy(car.position).add(exitPos); player.position.y = 0; showFootUI(); }
        }

        function punch() {
            if (state !== 'foot' || punchTime > 0) return;
            punchTime = 0.3; playSound(150, 0.15, 'sine', 0.5);
            let forward = new THREE.Vector3(); camera.getWorldDirection(forward); forward.y = 0; forward.normalize();
            npcs.forEach(npc => {
                if (npc.userData.state !== 'stunned') {
                    let toNpc = new THREE.Vector3().subVectors(npc.position, player.position); let dist = toNpc.length();
                    if (dist < 2.5) { toNpc.normalize(); if (forward.dot(toNpc) > 0.6) { npc.userData.state = 'stunned'; npc.userData.stunTime = 1.0; npc.userData.knockDir = toNpc.clone().multiplyScalar(1.5); createDialogue(npcPunchDialogues[Math.floor(Math.random() * npcPunchDialogues.length)], npc); if (npcApproaching === npc) { npcApproaching = null; approachCooldown = 20; } } }
                }
            });
        }

        function jump() { if (state === 'foot' && !isJumping) { isJumping = true; playerVY = 0.3; } }

        const CITY_LIMIT = 175;
        function updatePlayer(dt) {
            if (state !== 'foot') return;
            let moveSpeed = isSprinting ? 0.35 : 0.15;
            let forward = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw)), right = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
            let moveDir = new THREE.Vector3(); moveDir.addScaledVector(forward, -joyVec.y); moveDir.addScaledVector(right, joyVec.x);
            let isMoving = moveDir.lengthSq() > 0;
            if (isMoving) {
                moveDir.normalize().multiplyScalar(moveSpeed); player.position.add(moveDir);
                walkDialogueTimer -= dt;
                if (walkDialogueTimer <= 0) { createDialogue(walkDialogues[Math.floor(Math.random() * walkDialogues.length)], player); walkDialogueTimer = 10 + Math.random() * 10; }
            }
            if (isJumping) { playerVY -= 0.015; player.position.y += playerVY; if (player.position.y <= 0) { player.position.y = 0; isJumping = false; playerVY = 0; } }
            resolveCollisions(player, 0.5);
            player.position.x = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, player.position.x)); player.position.z = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, player.position.z));
            camera.position.set(player.position.x, 1.7 + player.position.y, player.position.z); camera.rotation.set(camPitch, camYaw, 0, 'YXZ');
            if (punchTime > 0) { punchTime -= dt; let pp = 1 - (punchTime / 0.3); fistMesh.position.z = -0.8 - Math.sin(pp * Math.PI) * 0.6; fistMesh.position.y = -0.3 + Math.sin(pp * Math.PI) * 0.1; } 
            else { fistMesh.position.z = -0.8; fistMesh.position.y = -0.3 - (player.position.y * 0.5); }
            if (player.position.distanceTo(car.position) < 8) driveBtn.style.display = 'flex'; else if (state === 'foot') driveBtn.style.display = 'none';
        }

        function updateCar(dt) {
            if (state !== 'driving') return;
            let maxSpeed = isBoosting ? 2.0 : 1.0, accel = isBoosting ? 0.05 : 0.02;
            
            // Gas and Brake Logic
            if (isGas) { car.userData.speed += accel; }
            if (isBrake) { car.userData.speed -= accel; }
            if (!isGas && !isBrake) { car.userData.speed *= 0.98; } // Natural friction
            
            car.userData.speed = Math.max(-maxSpeed/2, Math.min(maxSpeed, car.userData.speed));
            
            let steerInput = steerCurrentAngle / (Math.PI/2); 
            if (Math.abs(car.userData.speed) > 0.05) car.rotation.y -= steerInput * 0.025 * Math.sign(car.userData.speed);
            if (steerTouchId === null) { steerCurrentAngle *= 0.9; steeringWheel.style.transform = `rotate(${steerCurrentAngle}rad)`; }
            
            let forward = new THREE.Vector3(-Math.sin(car.rotation.y), 0, -Math.cos(car.rotation.y)); 
            car.position.addScaledVector(forward, car.userData.speed); car.position.y = 0;
            resolveCollisions(car, 1.5); car.position.x = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, car.position.x)); car.position.z = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, car.position.z));
            
            // Lights Logic
            let isBraking = isBrake && car.userData.speed > 0;
            let isReversing = car.userData.speed < 0;
            carBrakeLights.forEach(l => l.material.emissive.setHex(isReversing ? 0xffffff : (isBraking ? 0xff0000 : 0x330000)));
            speedometer.innerText = Math.abs(car.userData.speed * 30).toFixed(0) + " km/h";
            
            driveDialogueTimer -= dt;
            if (Math.abs(car.userData.speed) > 0.5 && driveDialogueTimer <= 0) { createDialogue(driveDialogues[Math.floor(Math.random() * driveDialogues.length)], player); driveDialogueTimer = 10 + Math.random() * 10; }

            let camDist = 8, camHeight = 4, offsetX = camDist * Math.sin(car.rotation.y), offsetZ = camDist * Math.cos(car.rotation.y);
            camera.position.x = car.position.x + offsetX; camera.position.y = car.position.y + camHeight; camera.position.z = car.position.z + offsetZ; camera.lookAt(car.position.x, car.position.y + 1, car.position.z);
        }

        function updateNPCs(dt) {
            let impactOrigin = state === 'foot' ? player.position : car.position, impactRadius = state === 'foot' ? 1.2 : 2.2, impactForce = state === 'foot' ? 0.0 : 0.8; let time = clock.getElapsedTime();
            if (approachCooldown > 0) approachCooldown -= dt;
            if (state === 'foot' && !npcApproaching && approachCooldown <= 0) {
                let closestDist = 30, closestNpc = null;
                npcs.forEach(npc => { if (npc.userData.state === 'walking') { let dist = npc.position.distanceTo(player.position); if (dist < closestDist) { closestDist = dist; closestNpc = npc; } } });
                if (closestNpc) { npcApproaching = closestNpc; closestNpc.userData.state = 'approaching'; }
            }
            npcs.forEach(npc => {
                if (npc.userData.state === 'knocked') { npc.userData.vy -= 0.04; npc.position.y += npc.userData.vy; npc.position.x += npc.userData.vx; npc.position.z += npc.userData.vz; npc.rotation.x += 0.2; npc.rotation.z += 0.15; if (npc.position.y <= 0) { npc.position.y = 0; npc.userData.vy = 0; npc.userData.vx = 0; npc.userData.vz = 0; npc.userData.state = 'walking'; npc.rotation.x = 0; npc.rotation.z = 0; npc.userData.target = new THREE.Vector3(npc.position.x + (Math.random()*40-20), 0, npc.position.z + (Math.random()*40-20)); } } 
                else if (npc.userData.state === 'stunned') { npc.userData.stunTime -= dt; npc.position.add(npc.userData.knockDir.clone().multiplyScalar(dt * 2)); npc.userData.knockDir.multiplyScalar(0.9); npc.position.y = -0.2 * Math.sin((1.0 - npc.userData.stunTime) * Math.PI); npc.rotation.x = -0.3 * Math.sin((1.0 - npc.userData.stunTime) * Math.PI); if (npc.userData.stunTime <= 0) { npc.userData.state = 'walking'; npc.position.y = 0; npc.rotation.x = 0; } } 
                else if (npc.userData.state === 'talking') { npc.userData.talkTime -= dt; let p = time * 5; npc.userData.armL.rotation.x = Math.sin(p) * 0.8; npc.userData.armR.rotation.x = -Math.sin(p) * 0.8; if (npc.userData.talkTime <= 0) { npc.userData.state = 'walking'; npc.userData.target = new THREE.Vector3(Math.random() * 150 - 75, 0, Math.random() * 150 - 75); if (npcApproaching === npc) { npcApproaching = null; approachCooldown = 20; } } } 
                else if (npc.userData.state === 'approaching') { if (state !== 'foot') { npc.userData.state = 'walking'; if (npcApproaching === npc) npcApproaching = null; } else { let dir = new THREE.Vector3().subVectors(player.position, npc.position); dir.y = 0; if (dir.length() < 3) { npc.userData.state = 'talking'; npc.userData.talkTime = 10.0; createDialogue(npcTalkDialogues[Math.floor(Math.random() * npcTalkDialogues.length)], npc); } else { dir.normalize().multiplyScalar(npc.userData.speed * 1.5); npc.position.add(dir); npc.rotation.y = Math.atan2(dir.x, dir.z); let p = time * 6 + npc.userData.walkPhase; npc.userData.legL.rotation.x = Math.sin(p) * 0.5; npc.userData.legR.rotation.x = -Math.sin(p) * 0.5; npc.userData.armL.rotation.x = -Math.sin(p) * 0.5; npc.userData.armR.rotation.x = Math.sin(p) * 0.5; } } } 
                else { let dir = new THREE.Vector3().subVectors(npc.userData.target, npc.position); dir.y = 0; if (dir.length() < 2) { npc.userData.target.set(npc.position.x + (Math.random()*80-40), 0, npc.position.z + (Math.random()*80-40)); } else { dir.normalize().multiplyScalar(npc.userData.speed); npc.position.add(dir); npc.rotation.y = Math.atan2(dir.x, dir.z); let p = time * 5 + npc.userData.walkPhase; npc.userData.legL.rotation.x = Math.sin(p) * 0.5; npc.userData.legR.rotation.x = -Math.sin(p) * 0.5; npc.userData.armL.rotation.x = -Math.sin(p) * 0.5; npc.userData.armR.rotation.x = Math.sin(p) * 0.5; } }
                if (npc.userData.state !== 'knocked') npc.position.y = 0;
                resolveCollisions(npc, 0.5); npc.position.x = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, npc.position.x)); npc.position.z = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, npc.position.z));
                let distToImpact = npc.position.distanceTo(impactOrigin); if (distToImpact < impactRadius && impactForce > 0) { let knockDir = new THREE.Vector3().subVectors(npc.position, impactOrigin); knockDir.y = 0; knockDir.normalize(); npc.userData.state = 'knocked'; npc.userData.vy = 0.5 + impactForce; npc.userData.vx = knockDir.x * impactForce; npc.userData.vz = knockDir.z * impactForce; if (npcApproaching === npc) { npcApproaching = null; approachCooldown = 20; } }
            });
        }

        function animate() {
            requestAnimationFrame(animate); let dt = clock.getDelta();
            updatePlayer(dt); updateCar(dt); updateNPCs(dt); updateDialogues(dt);
            renderer.render(scene, camera);
        }
        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        init();
    </script>
</body>
