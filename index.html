<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anime City Sandbox</title>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: #87CEEB; width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0;
            overscroll-behavior: none; touch-action: none;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none;
        }
        #menu-top-bar { display: flex; gap: 15px; padding: 20px; pointer-events: auto; }
        .menu-btn {
            width: 50px; height: 50px; background: rgba(255,255,255,0.9); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer; transition: transform 0.1s;
        }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn svg { width: 24px; height: 24px; fill: #555; }
        
        #enter-btn {
            position: absolute; bottom: 40px; left: 40px; 
            padding: 15px 30px; background: white; color: #333; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            pointer-events: auto; transition: transform 0.1s, background 0.2s;
        }
        #enter-btn:active { transform: scale(0.98); background: #eee; }

        .ui-btn {
            position: absolute; 
            background: rgba(40, 40, 40, 0.4); 
            border: 2px solid rgba(255, 255, 255, 0.6); 
            border-radius: 50%; 
            color: white; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            pointer-events: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            transition: transform 0.08s, background 0.1s, border 0.2s; 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 20;
            width: 70px; height: 70px;
        }
        .ui-btn:active { transform: scale(0.90); background: rgba(120, 120, 120, 0.7); }
        .ui-btn svg { width: 60%; height: 60%; fill: white; pointer-events: none; }
        .ui-btn.active-toggle { background: rgba(0, 150, 255, 0.8); border-color: white; }
        .ui-btn.editing { border: 2px dashed #ffeb3b; background: rgba(255, 235, 59, 0.2); }

        #back-btn { top: 20px; left: 20px; width: 45px; height: 45px; display: flex; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 8px; height: 8px; background: rgba(255,255,255,0.7); border-radius: 50%;
            display: none; z-index: 5; box-shadow: 0 0 4px rgba(0,0,0,0.8);
        }

        #break-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background-size: cover; opacity: 0; z-index: 6;
            pointer-events: none; transition: opacity 0.1s;
        }

        #speedometer {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: white; padding: 5px 15px; border-radius: 10px;
            font-size: 18px; font-weight: bold; display: none; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3); z-index: 20;
        }

        #hotbar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; gap: 10px; z-index: 20; pointer-events: auto;
        }
        .slot {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-size: 12px; font-weight: bold; position: relative;
        }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.2); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .slot svg { width: 30px; height: 30px; fill: #ffeb3b; margin-bottom: 2px; }
        .slot .count { position: absolute; bottom: 2px; right: 4px; font-size: 14px; text-shadow: 1px 1px 2px black; }

        #cam-area { position: absolute; top: 0; right: 0; width: 60%; height: 100%; pointer-events: auto; display: block; z-index: 1; }
        
        #steering-wheel {
            position: absolute; bottom: 40px; right: 30px; width: 140px; height: 140px;
            border: 6px solid rgba(255,255,255,0.4); border-radius: 50%;
            background: rgba(0,0,0,0.2); display: none; pointer-events: auto; z-index: 15;
            touch-action: none;
        }
        #steering-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; }
        #steering-spoke { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; }

        #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 15; backdrop-filter: blur(4px); display: none; }
        #joystick-knob { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.6); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        #drive-btn { bottom: 120px; right: 180px; }
        #exit-btn { bottom: 120px; left: 40px; }
        #sprint-btn { bottom: 130px; right: 30px; }
        #jump-btn { bottom: 130px; right: 110px; }
        #punch-btn { bottom: 40px; right: 100px; } 
        
        #gas-btn { bottom: 40px; left: 160px; }
        #brake-btn { bottom: 40px; left: 40px; }
        #boost-btn { bottom: 130px; left: 100px; }
        #horn-btn { bottom: 130px; left: 180px; }

        #edit-panel { position: absolute; top: 75px; left: 20px; width: 240px; background: rgba(20, 20, 20, 0.8); color: white; padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); display: none; z-index: 30; backdrop-filter: blur(4px); }
        #edit-panel h3 { margin: 0 0 10px 0; font-size: 16px; }
        #edit-panel label { font-size: 14px; display: block; margin-bottom: 10px; }
        #edit-panel input[type="range"] { width: 100%; }
        #edit-toggle-btn { width: 100%; padding: 8px; margin-top: 10px; background: #ff9800; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #edit-toggle-btn.active { background: #f44336; }

        .dialogue-box { position: absolute; background: rgba(255, 255, 255, 0.9); color: black; padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; transform: translate(-50%, -100%); pointer-events: none; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: opacity 0.2s; z-index: 5; opacity: 0; }
        .dialogue-box::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.9) transparent transparent transparent; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="cam-area"></div>
        <div id="steering-wheel"><div id="steering-spoke"></div><div id="steering-inner"></div></div>
        
        <div id="crosshair"></div>
        <div id="break-overlay"></div>
        <div id="speedometer">0 km/h</div>

        <div id="hotbar">
            <div class="slot active" id="slot-wood">
                <svg viewBox="0 0 24 24"><path d="M12,2L2,12H5V20H19V12H22L12,2Z"/></svg>
                <span class="count" id="wood-count">0</span>

        </div>

        <div id="joystick-base"><div id="joystick-knob"></div></div>
        
        <button id="back-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L7,15.59V9H5V19H15V17H8.41L19,6.41Z"/></svg></button>
        
        <div id="edit-panel">
            <h3>UI Customization</h3>

            <input type="range" id="scale-slider" min="50" max="150" value="100">
            <button id="edit-toggle-btn">Enable Edit Mode</button>
        </div>
        
        <button id="drive-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M18.92,6.01C18.72,5.42,18.16,5,17.5,5h-11C5.84,5,5.29,5.42,5.08,6.01L3,12v8c0,0.55,0.45,1,1,1h1c0.55,0,1-0.45,1-1v-1h12v1c0,0.55,0.45,1,1,1h1c0.55,0,1-0.45,1-1v-8L18.92,6.01z M6.5,16c-0.83,0-1.5-0.67-1.5-1.5S5.67,13,6.5,13S8,13.67,8,14.5S7.33,16,6.5,16z M17.5,16c-0.83,0-1.5-0.67-1.5-1.5s0.67-1.5,1.5-1.5s1.5,0.67,1.5,1.5S18.33,16,17.5,16z M5,11l1.5-4.5h11L19,11H5z"/></svg></button>
        <button id="sprint-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M13.49,5.48c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S12.39,5.48,13.49,5.48z M9.89,19.38l1-4.4l2.1,2v6h2v-7.5l-2.1-2l0.6-3c1.3,1.5,3.3,2.5,5.5,2.5v-2c-1.9,0-3.5-1-4.3-2.4l-1-1.6c-0.4-0.6-1-1-1.7-1c-0.3,0-0.5,0.1-0.8,0.1l-5.2,2.2v4.7h2v-3.4l1.8-0.7l-1.6,8.1l-4.9-1l-0.4,2l7,1.4z"/></svg></button>

        <button id="punch-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M23,5.5V20c0,2.2-1.8,4-4,4h-7.3c-1.08,0-2.1-0.43-2.85-1.19L1,14.83c0,0,1.26-1.23,1.3-1.25c0.22-0.19,0.49-0.29,0.79-0.29c0.22,0,0.42,0.06,0.6,0.16L6,15V4c0-1.1,0.9-2,2-2s2,0.9,2,2v6h1V2.5c0-1.1,0.9-2,2-2s2,0.9,2,2V10h1V4c0-1.1,0.9-2,2-2s2,0.9,2,2v6h1V5.5C21.45,4.4,22.35,3.5,23,5.5z"/></svg></button>
        
        <button id="exit-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M11,7L9.6,8.4l2.6,2.6H2v2h10.2l-2.6,2.6L11,17l5-5L11,7z M20,19h-8v2h8c1.1,0,2-0.9,2-2V5c0-1.1-0.9-2-2-2h-8v2h8V19z"/></svg></button>
        <button id="gas-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M20,8h-3V4H3v13h2c0,1.66,1.34,3,3,3s3-1.34,3-3h6c0,1.66,1.34,3,3,3s3-1.34,3-3h2v-5L20,8z M8,18.5c-0.83,0-1.5-0.67-1.5-1.5s0.67-1.5,1.5-1.5s1.5,0.67,1.5,1.5S8.83,18.5,8,18.5z M19,14h-3V9h2.5L19,11.5V14z M18,18.5c-0.83,0-1.5-0.67-1.5-1.5s0.67-1.5,1.5-1.5s1.5,0.67,1.5,1.5S18.83,18.5,18,18.5z"/></svg></button>

        <button id="boost-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M13,3L4,14h7l-2,7l9-11h-7L13,3z"/></svg></button>
        <button id="horn-btn" class="ui-btn"><svg viewBox="0 0 24 24"><path d="M12,22c1.1,0,2-0.9,2-2h-4C10,21.1,10.9,22,12,22z M18,16v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-0.83-0.67-1.5-1.5-1.5S10.5,3.17,10.5,4v0.68C7.64,5.36,6,7.92,6,11v5l-2,2v1h16v-1L18,16z"/></svg></button>
    </div>

    <div id="loading-screen">
        <div id="menu-top-bar">
            <div class="menu-btn" id="menu-settings-btn"><svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg></div>
            <div class="menu-btn" id="menu-layout-btn"><svg viewBox="0 0 24 24"><path d="M3,13h2v-2H3V13z M3,17h2v-2H3V17z M3,9h2V7H3V9z M7,13h14v-2H7V13z M7,17h14v-2H7V17z M7,7v2h14V7H7z"/></svg></div>
        </div>
        <button id="enter-btn">Enter the World</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- GLOBALS ---
        let scene, camera, renderer, menuCamera;
        let player, menuPlayer, car, npcs = [], trees = [], clouds = [], collidableMeshes = [];
        let state = 'menu';
        let clock;
        let buildingColliders = [], houseBounds = [];
        let dirLight, hemiLight, sunMesh, carBrakeLights = [];
        let headlight1, headlight2;
        let dialogues = [];
        let woodCount = 0;
        let raycaster, heldBlock;

        let joyVec = { x: 0, y: 0 };
        let camYaw = 0, camPitch = 0.2;
        let steerCurrentAngle = 0, steerLastAngle = 0;
        let isSprinting = false, isBoosting = false, isGas = false, isBrake = false;
        let punchTime = 0, playerVY = 0, isJumping = false;
        let npcApproaching = null, approachCooldown = 0;
        let walkDialogueTimer = 0, driveDialogueTimer = 0;
        let dayTime = 0.3;

        let joyTouchId = null, lookTouchId = null, steerTouchId = null;
        let camLastX = 0, camLastY = 0;
        let uiEditMode = false, dragTarget = null, dragOffsetX = 0, dragOffsetY = 0;
        
        // Tap to Place logic
        let tapStartX = 0, tapStartY = 0, tapStartTime = 0, tapTouchId = null;

        const driveBtn = document.getElementById('drive-btn');
        const exitBtn = document.getElementById('exit-btn');
        const sprintBtn = document.getElementById('sprint-btn');
        const jumpBtn = document.getElementById('jump-btn');
        const punchBtn = document.getElementById('punch-btn');
        const gasBtn = document.getElementById('gas-btn');
        const brakeBtn = document.getElementById('brake-btn');
        const boostBtn = document.getElementById('boost-btn');
        const hornBtn = document.getElementById('horn-btn');
        const backBtn = document.getElementById('back-btn');
        const editPanel = document.getElementById('edit-panel');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleVal = document.getElementById('scale-val');
        const editToggleBtn = document.getElementById('edit-toggle-btn');
        const camArea = document.getElementById('cam-area');
        const steeringWheel = document.getElementById('steering-wheel');
        const crosshair = document.getElementById('crosshair');
        const speedometer = document.getElementById('speedometer');
        const joyBase = document.getElementById('joystick-base');
        const joyKnob = document.getElementById('joystick-knob');
        const woodCountEl = document.getElementById('wood-count');
        const breakOverlay = document.getElementById('break-overlay');
        const hotbar = document.getElementById('hotbar');
        const loadingScreen = document.getElementById('loading-screen');
        const enterBtn = document.getElementById('enter-btn');

        const walkDialogues = ["Just walking around...", "What a nice city.", "Where is everyone?", "I should get a snack."];
        const driveDialogues = ["Need for speed!", "Out of my way!", "Vroom vroom!", "Traffic is crazy."];
        const npcTalkDialogues = ["Hey there!", "Nice weather.", "You new here?", "I'm late for class!"];
        const npcPunchDialogues = ["Ouch!", "Why I oughta...!", "Rude!", "I'll get you back!"];
        const menuDialogues = ["Welcome!", "Ready to play?", "Nice day, right?", "Let's explore!"];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 150, 400);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 600);
            menuCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            scene.add(camera);
            scene.add(menuCamera);
            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();

            setupLights();
            createWorld();
            createPlayer();
            createMenuPlayer();
            createCar();
            spawnNPCs(15);
            setupMenuScene();
            setupControls();
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createMenuPlayer() {
            menuPlayer = new THREE.Group();
            let skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            let shirtMat = new THREE.MeshStandardMaterial({ color: 0x29b6f6 });
            let pantsMat = new THREE.MeshStandardMaterial({ color: 0x37474f });

            let torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.5), shirtMat); torso.position.y = 1.5; torso.castShadow = true; menuPlayer.add(torso);
            let head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skinMat); head.position.y = 2.3; head.castShadow = true; menuPlayer.add(head);
            let hair = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.15, 0.65), new THREE.MeshStandardMaterial({color: 0x3e2723})); hair.position.y = 2.6; menuPlayer.add(hair);
            let legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), pantsMat); legL.position.set(-0.2, 0.5, 0); menuPlayer.add(legL);
            let legR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), pantsMat); legR.position.set(0.2, 0.5, 0); menuPlayer.add(legR);
            let armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), shirtMat); armL.position.set(-0.5, 1.5, 0); menuPlayer.add(armL);
            let armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), shirtMat); armR.position.set(0.5, 1.5, 0); menuPlayer.add(armR);
            
            menuPlayer.position.set(0, 0, 0);
            scene.add(menuPlayer);
        }

        function setupMenuScene() {
            for(let i=0; i<4; i++) {
                let angle = (i / 4) * Math.PI * 2;
                npcs[i].position.set(Math.cos(angle) * 4, 0, Math.sin(angle) * 4);
                npcs[i].rotation.y = Math.atan2(0 - npcs[i].position.x, 0 - npcs[i].position.z);
                npcs[i].userData.state = 'frozen';
                createDialogue(menuDialogues[Math.floor(Math.random() * menuDialogues.length)], npcs[i]);
            }
            car.position.set(8, 0, 0);
        }

        function showFootUI() {
            sprintBtn.style.display = 'flex'; jumpBtn.style.display = 'flex'; punchBtn.style.display = 'flex';
            crosshair.style.display = 'block'; camArea.style.display = 'block'; joyBase.style.display = 'block'; hotbar.style.display = 'flex';
            backBtn.style.display = 'flex';
            exitBtn.style.display = 'none'; gasBtn.style.display = 'none'; brakeBtn.style.display = 'none';
            boostBtn.style.display = 'none'; hornBtn.style.display = 'none';

        function createTree(x, z) {

        function resolveCollisions(entity, radius) {
            let pos = entity.position;
            for (let i = 0; i < buildingColliders.length; i++) {
                let box = buildingColliders[i], center = box.getCenter(new THREE.Vector3());
                if (pos.distanceTo(center) > 40) continue; 
                let cx = Math.max(box.min.x, Math.min(pos.x, box.max.x)), cz = Math.max(box.min.z, Math.min(pos.z, box.max.z));
                let dx = pos.x - cx, dz = pos.z - cz, distSq = dx*dx + dz*dz;
                if (distSq < radius * radius) { let dist = Math.sqrt(distSq); if (dist === 0) { pos.x += radius; } else { let push = (radius - dist); pos.x += (dx/dist) * push; pos.z += (dz/dist) * push; } }
            }
        }

        function updateDialogues(dt) {
            let vec = new THREE.Vector3();
            for (let i = dialogues.length - 1; i >= 0; i--) {
                let d = dialogues[i]; 
                if (state !== 'menu') d.time -= dt; // Freeze time in menu
                if (d.time <= 0) { d.el.style.opacity = 0; setTimeout(() => { d.el.remove(); }, 200); dialogues.splice(i, 1); continue; }
                vec.copy(d.entity.position).add(new THREE.Vector3(0, 1.2, 0)); 
                let activeCam = state === 'menu' ? menuCamera : camera;
                vec.project(activeCam);
                let x = (vec.x * 0.5 + 0.5) * window.innerWidth, y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
                d.el.style.left = x + 'px'; d.el.style.top = y + 'px'; d.el.style.opacity = (vec.z > 1) ? 0 : 1;
            }
        }

                for (let i = 0; i < e.changedTouches.length; i++) {

                    if (!target) continue;
                    if (uiEditMode) {
                        if (target.closest('.ui-btn.editing')) { dragTarget = target.closest('.ui-btn'); let rect = dragTarget.getBoundingClientRect(); dragOffsetX = t.clientX - rect.left; dragOffsetY = t.clientY - rect.top; dragTarget.style.bottom = 'auto'; dragTarget.style.right = 'auto'; continue; }
                    } else {
                        if (target.closest('#joystick-base') && joyTouchId === null && state === 'foot') { joyTouchId = t.identifier; handleJoyMove(t.clientX, t.clientY); } 
                        else if (target.closest('#steering-wheel') && steerTouchId === null && state === 'driving') { steerTouchId = t.identifier; let rect = steeringWheel.getBoundingClientRect(); steerLastAngle = Math.atan2(t.clientY - (rect.top + rect.height/2), t.clientX - (rect.left + rect.width/2)); } 
                        else if (target.closest('#cam-area') && lookTouchId === null && state === 'foot') { 
                            lookTouchId = t.identifier; camLastX = t.clientX; camLastY = t.clientY;

                        }

                }
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (state === 'menu') return;

                    else {
                        if (t.identifier === joyTouchId) handleJoyMove(t.clientX, t.clientY);
                        else if (t.identifier === steerTouchId) handleSteerMove(t.clientX, t.clientY);
                        else if (t.identifier === lookTouchId) handleLookMove(t.clientX, t.clientY);

                    else if (t.identifier === steerTouchId) steerTouchId = null; 
                    else if (t.identifier === lookTouchId) {
                        lookTouchId = null;
                        // Check for Tap to Place
                        if (tapTouchId === t.identifier) {
                            let dx = t.clientX - tapStartX, dy = t.clientY - tapStartY;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            if (Date.now() - tapStartTime < 200 && dist < 10) {

            window.addEventListener('mouseup', (e) => { if (tapTouchId === -1 && state === 'foot') { let dx = e.clientX - tapStartX, dy = e.clientY - tapStartY; if (Date.now() - tapStartTime < 200 && Math.sqrt(dx*dx+dy*dy) < 10) placeBlock(); tapTouchId = null; } });
            document.querySelectorAll('.ui-btn').forEach(btn => { btn.addEventListener('mousedown', (e) => { if (uiEditMode && btn.classList.contains('editing')) { dragTarget = btn; let rect = btn.getBoundingClientRect(); dragOffsetX = e.clientX - rect.left; dragOffsetY = e.clientY - rect.top; btn.style.bottom = 'auto'; btn.style.right = 'auto'; } }); });
        }

        function handleJoyMove(cx, cy) { let rect = joyBase.getBoundingClientRect(); let dx = cx - (rect.left + rect.width / 2), dy = cy - (rect.top + rect.height / 2); let dist = Math.sqrt(dx*dx + dy*dy), maxDist = rect.width / 2; if (dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; } joyKnob.style.left = (30 + dx) + 'px'; joyKnob.style.top = (30 + dy) + 'px'; joyVec.x = dx/maxDist; joyVec.y = dy/maxDist; }
        function handleLookMove(cx, cy) { let dx = cx - camLastX, dy = cy - camLastY; camLastX = cx; camLastY = cy; camYaw -= dx * 0.005; camPitch -= dy * 0.005; camPitch = Math.max(-1.2, Math.min(1.2, camPitch)); }
        function handleSteerMove(cx, cy) { let rect = steeringWheel.getBoundingClientRect(); let dx = cx - (rect.left + rect.width/2), dy = cy - (rect.top + rect.height/2); let angle = Math.atan2(dy, dx); let delta = angle - steerLastAngle; if (delta > Math.PI) delta -= Math.PI*2; if (delta < -Math.PI) delta += Math.PI*2; steerCurrentAngle += delta; steerCurrentAngle = Math.max(-Math.PI/2, Math.min(Math.PI/2, steerCurrentAngle)); steerLastAngle = angle; steeringWheel.style.transform = `rotate(${steerCurrentAngle}rad)`; }

        function toggleDrive() {
            if (state === 'foot') { if (player.position.distanceTo(car.position) < 8) { state = 'driving'; showCarUI(); } } 
            else { state = 'foot'; let exitPos = new THREE.Vector3(2.5, 0, 0); exitPos.applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y); player.position.copy(car.position).add(exitPos); player.position.y = 0; showFootUI(); }
        }

        function punch() {
            if (state !== 'foot' || punchTime > 0) return;
            punchTime = 0.3;
            let forward = new THREE.Vector3(); camera.getWorldDirection(forward); forward.y = 0; forward.normalize();
            
            trees.forEach(tree => {
                if (!tree.userData.chopped) {
                    let toTree = new THREE.Vector3().subVectors(tree.position, player.position);
                    let dist = toTree.length();
                    if (dist < 3.5) { 
                        toTree.normalize(); 
                        if (forward.dot(toTree) > 0.5) { 
                            tree.userData.breakProgress += 0.34;
                            if (tree.userData.breakProgress >= 1) {
                                tree.userData.chopped = true; tree.userData.fallTime = 0;
                                let drop = Math.floor(10 + Math.random() * 6);
                                woodCount += drop; woodCountEl.innerText = woodCount;
                                createDialogue(`+${drop} Wood`, player);
                            }
                        }
                    }
                }
            });

            npcs.forEach(npc => {
                if (npc.userData.state !== 'stunned') {
                    let toNpc = new THREE.Vector3().subVectors(npc.position, player.position); let dist = toNpc.length();
                    if (dist < 2.5) { toNpc.normalize(); if (forward.dot(toNpc) > 0.6) { npc.userData.state = 'stunned'; npc.userData.stunTime = 1.0; npc.userData.knockDir = toNpc.clone().multiplyScalar(1.5); createDialogue(npcPunchDialogues[Math.floor(Math.random() * npcPunchDialogues.length)], npc); if (npcApproaching === npc) { npcApproaching = null; approachCooldown = 20; } } }
                }
            });
        }

        function placeBlock() {
            if (state !== 'foot' || woodCount <= 0) return;
            raycaster.setFromCamera({x: 0, y: 0}, camera);
            let intersects = raycaster.intersectObjects(collidableMeshes);
            if (intersects.length > 0) {
                let hit = intersects[0];
                // Snap to 1x1 grid
                let pos = new THREE.Vector3(
                    Math.floor(hit.point.x) + 0.5,
                    Math.floor(hit.point.y) + 0.5,
                    Math.floor(hit.point.z) + 0.5
                );
                // Ensure it doesn't place inside the ground
                if (hit.point.y < 0.1) pos.y = 0.5;
                
                let block = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0x8d6e63 }));
                block.position.copy(pos); block.castShadow = true; block.receiveShadow = true;
                scene.add(block);
                buildingColliders.push(new THREE.Box3().setFromObject(block)); 
                collidableMeshes.push(block);
                woodCount--; woodCountEl.innerText = woodCount;
            }
        }

        function jump() { if (state === 'foot' && !isJumping) { isJumping = true; playerVY = 0.3; } }

        const CITY_LIMIT = 175;
        function updateMenu(dt) {
            camYaw += dt * 0.2;
            let camDist = 6, camHeight = 2.5;
            menuCamera.position.x = menuPlayer.position.x + camDist * Math.sin(camYaw);
            menuCamera.position.z = menuPlayer.position.z + camDist * Math.cos(camYaw);
            menuCamera.position.y = menuPlayer.position.y + camHeight;
            menuCamera.lookAt(menuPlayer.position.x, menuPlayer.position.y + 1.5, menuPlayer.position.z);
            menuCamera.up.set(0, 1, 0);
        }

        function updatePlayer(dt) {
            if (state !== 'foot') return;
            let moveSpeed = isSprinting ? 0.35 : 0.15;
            let forward = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw)), right = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
            let moveDir = new THREE.Vector3(); moveDir.addScaledVector(forward, -joyVec.y); moveDir.addScaledVector(right, joyVec.x);
            let isMoving = moveDir.lengthSq() > 0;
            if (isMoving) {
                moveDir.normalize().multiplyScalar(moveSpeed); player.position.add(moveDir);
                walkDialogueTimer -= dt;
                if (walkDialogueTimer <= 0) { createDialogue(walkDialogues[Math.floor(Math.random() * walkDialogues.length)], player); walkDialogueTimer = 10 + Math.random() * 10; }
            }
            if (isJumping) { playerVY -= 0.015; player.position.y += playerVY; if (player.position.y <= 0) { player.position.y = 0; isJumping = false; playerVY = 0; } }
            resolveCollisions(player, 0.5);
            player.position.x = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, player.position.x)); player.position.z = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, player.position.z));
            camera.position.set(player.position.x, 1.7 + player.position.y, player.position.z); camera.rotation.set(camPitch, camYaw, 0, 'YXZ');
            if (punchTime > 0) { punchTime -= dt; let pp = 1 - (punchTime / 0.3); heldBlock.position.z = -1 - Math.sin(pp * Math.PI) * 0.6; heldBlock.position.y = -0.5 + Math.sin(pp * Math.PI) * 0.1; } 
            else { heldBlock.position.z = -1; heldBlock.position.y = -0.5 - (player.position.y * 0.5); }
            if (player.position.distanceTo(car.position) < 8) driveBtn.style.display = 'flex'; else if (state === 'foot') driveBtn.style.display = 'none';
            
            let breaking = false;
            trees.forEach(tree => {
                if (!tree.userData.chopped && tree.userData.breakProgress > 0) {
                    let toTree = new THREE.Vector3().subVectors(tree.position, player.position);
                    if (toTree.length() < 3.5) {
                        let fwd = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
                        if (fwd.dot(toTree.normalize()) > 0.5) {
                            breaking = true;
                            breakOverlay.style.opacity = 1;
                            let scale = 0.5 + tree.userData.breakProgress * 0.5;
                            breakOverlay.style.transform = `translate(-50%, -50%) scale(${scale})`;
                            breakOverlay.style.background = `radial-gradient(circle, transparent ${30 - tree.userData.breakProgress * 30}%, rgba(0,0,0,0.6) ${40 - tree.userData.breakProgress * 40}%)`;
                        }
                    }
                }
            });
            if (!breaking) breakOverlay.style.opacity = 0;
        }

        function updateCar(dt) {
            if (state !== 'driving') return;
            let maxSpeed = isBoosting ? 2.0 : 1.0, accel = isBoosting ? 0.05 : 0.02;
            if (isGas) { car.userData.speed += accel; }
            if (isBrake) { car.userData.speed -= accel; }
            if (!isGas && !isBrake) { car.userData.speed *= 0.98; }
            car.userData.speed = Math.max(-maxSpeed/2, Math.min(maxSpeed, car.userData.speed));
            let steerInput = steerCurrentAngle / (Math.PI/2); 
            if (Math.abs(car.userData.speed) > 0.05) car.rotation.y -= steerInput * 0.025 * Math.sign(car.userData.speed);
            if (steerTouchId === null) { steerCurrentAngle *= 0.9; steeringWheel.style.transform = `rotate(${steerCurrentAngle}rad)`; }
            let forward = new THREE.Vector3(-Math.sin(car.rotation.y), 0, -Math.cos(car.rotation.y)); 
            car.position.addScaledVector(forward, car.userData.speed); car.position.y = 0;
            resolveCollisions(car, 1.5); car.position.x = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, car.position.x)); car.position.z = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, car.position.z));
            let isBraking = isBrake && car.userData.speed > 0, isReversing = car.userData.speed < 0;
            carBrakeLights.forEach(l => l.material.emissive.setHex(isReversing ? 0xffffff : (isBraking ? 0xff0000 : 0x330000)));
            speedometer.innerText = Math.abs(car.userData.speed * 30).toFixed(0) + " km/h";
            
            driveDialogueTimer -= dt;
            if (Math.abs(car.userData.speed) > 0.5 && driveDialogueTimer <= 0) { createDialogue(driveDialogues[Math.floor(Math.random() * driveDialogues.length)], player); driveDialogueTimer = 10 + Math.random() * 10; }
            let camDist = 8, camHeight = 4, offsetX = camDist * Math.sin(car.rotation.y), offsetZ = camDist * Math.cos(car.rotation.y);
            camera.position.x = car.position.x + offsetX; camera.position.y = car.position.y + camHeight; camera.position.z = car.position.z + offsetZ; camera.lookAt(car.position.x, car.position.y + 1, car.position.z);
        }

        function updateNPCs(dt) {
            if (state === 'menu') return;
            let impactOrigin = state === 'foot' ? player.position : car.position, impactRadius = state === 'foot' ? 1.2 : 2.2, impactForce = state === 'foot' ? 0.0 : 0.8; let time = clock.getElapsedTime();
            if (approachCooldown > 0) approachCooldown -= dt;
            if (state === 'foot' && !npcApproaching && approachCooldown <= 0) {
                let closestDist = 30, closestNpc = null;
                npcs.forEach(npc => { if (npc.userData.state === 'walking') { let dist = npc.position.distanceTo(player.position); if (dist < closestDist) { closestDist = dist; closestNpc = npc; } } });
                if (closestNpc) { npcApproaching = closestNpc; closestNpc.userData.state = 'approaching'; }
            }
            npcs.forEach(npc => {
                if (npc.userData.state === 'knocked') { npc.userData.vy -= 0.04; npc.position.y += npc.userData.vy; npc.position.x += npc.userData.vx; npc.position.z += npc.userData.vz; npc.rotation.x += 0.2; npc.rotation.z += 0.15; if (npc.position.y <= 0) { npc.position.y = 0; npc.userData.vy = 0; npc.userData.vx = 0; npc.userData.vz = 0; npc.userData.state = 'walking'; npc.rotation.x = 0; npc.rotation.z = 0; npc.userData.target = new THREE.Vector3(npc.position.x + (Math.random()*40-20), 0, npc.position.z + (Math.random()*40-20)); } } 
                else if (npc.userData.state === 'stunned') { npc.userData.stunTime -= dt; npc.position.add(npc.userData.knockDir.clone().multiplyScalar(dt * 2)); npc.userData.knockDir.multiplyScalar(0.9); npc.position.y = -0.2 * Math.sin((1.0 - npc.userData.stunTime) * Math.PI); npc.rotation.x = -0.3 * Math.sin((1.0 - npc.userData.stunTime) * Math.PI); if (npc.userData.stunTime <= 0) { npc.userData.state = 'walking'; npc.position.y = 0; npc.rotation.x = 0; } } 
                else if (npc.userData.state === 'talking') { npc.userData.talkTime -= dt; let p = time * 5; npc.userData.armL.rotation.x = Math.sin(p) * 0.8; npc.userData.armR.rotation.x = -Math.sin(p) * 0.8; if (npc.userData.talkTime <= 0) { npc.userData.state = 'walking'; npc.userData.target = new THREE.Vector3(Math.random() * 150 - 75, 0, Math.random() * 150 - 75); if (npcApproaching === npc) { npcApproaching = null; approachCooldown = 20; } } } 
                else if (npc.userData.state === 'approaching') { if (state !== 'foot') { npc.userData.state = 'walking'; if (npcApproaching === npc) npcApproaching = null; } else { let dir = new THREE.Vector3().subVectors(player.position, npc.position); dir.y = 0; if (dir.length() < 3) { npc.userData.state = 'talking'; npc.userData.talkTime = 10.0; createDialogue(npcTalkDialogues[Math.floor(Math.random() * npcTalkDialogues.length)], npc); } else { dir.normalize().multiplyScalar(npc.userData.speed * 1.5); npc.position.add(dir); npc.rotation.y = Math.atan2(dir.x, dir.z); let p = time * 6 + npc.userData.walkPhase; npc.userData.legL.rotation.x = Math.sin(p) * 0.5; npc.userData.legR.rotation.x = -Math.sin(p) * 0.5; npc.userData.armL.rotation.x = -Math.sin(p) * 0.5; npc.userData.armR.rotation.x = Math.sin(p) * 0.5; } } } 
                else if (npc.userData.state === 'walking') { let dir = new THREE.Vector3().subVectors(npc.userData.target, npc.position); dir.y = 0; if (dir.length() < 2) { npc.userData.target.set(npc.position.x + (Math.random()*80-40), 0, npc.position.z + (Math.random()*80-40)); } else { dir.normalize().multiplyScalar(npc.userData.speed); npc.position.add(dir); npc.rotation.y = Math.atan2(dir.x, dir.z); let p = time * 5 + npc.userData.walkPhase; npc.userData.legL.rotation.x = Math.sin(p) * 0.5; npc.userData.legR.rotation.x = -Math.sin(p) * 0.5; npc.userData.armL.rotation.x = -Math.sin(p) * 0.5; npc.userData.armR.rotation.x = Math.sin(p) * 0.5; } }
                if (npc.userData.state !== 'knocked') npc.position.y = 0;
                resolveCollisions(npc, 0.5); npc.position.x = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, npc.position.x)); npc.position.z = Math.max(-CITY_LIMIT, Math.min(CITY_LIMIT, npc.position.z));
                let distToImpact = npc.position.distanceTo(impactOrigin); if (distToImpact < impactRadius && impactForce > 0) { let knockDir = new THREE.Vector3().subVectors(npc.position, impactOrigin); knockDir.y = 0; knockDir.normalize(); npc.userData.state = 'knocked'; npc.userData.vy = 0.5 + impactForce; npc.userData.vx = knockDir.x * impactForce; npc.userData.vz = knockDir.z * impactForce; if (npcApproaching === npc) { npcApproaching = null; approachCooldown = 20; } }
            });
        }

        function updateTrees(dt) {
            trees.forEach(tree => {
                if (tree.userData.chopped && tree.userData.fallTime < 1) {
                    tree.userData.fallTime += dt * 2;
                    let rot = Math.PI / 2 * Math.min(1, tree.userData.fallTime);
                    tree.userData.upperTrunk.rotation.z = rot;
                    tree.userData.foliage.rotation.z = rot;
                    if (tree.userData.fallTime >= 1) {
                        tree.userData.foliage.visible = false;
                        tree.userData.upperTrunk.visible = false;
                    }
                }
            });
        }

        function updateDayNight(dt) {
            dayTime += dt / 600; // 10 minute cycle
            if (dayTime > 1) dayTime = 0;
            
            let sunAngle = dayTime * Math.PI * 2;
            sunMesh.position.set(Math.cos(sunAngle) * 150, Math.sin(sunAngle) * 150, -50);
            dirLight.position.copy(sunMesh.position);
            dirLight.target.position.set(0,0,0);

            let sunHeight = Math.sin(sunAngle);
            let dayColor = new THREE.Color(0x87CEEB), duskColor = new THREE.Color(0xFF8C00), nightColor = new THREE.Color(0x0a0a20);
            let currentColor = new THREE.Color();

            if (sunHeight > 0.2) {
                currentColor.copy(dayColor);
                dirLight.intensity = 1.0; hemiLight.intensity = 0.9; sunMesh.material.color.setHex(0xfff59d);
                headlight1.intensity = 0; headlight2.intensity = 0;
            } else if (sunHeight > -0.2) {
                let lerpFactor = (sunHeight + 0.2) / 0.4;
                currentColor.lerpColors(nightColor, duskColor, lerpFactor);
                if (sunHeight < 0) currentColor.lerpColors(duskColor, dayColor, sunHeight * 5);
                dirLight.intensity = 0.5; hemiLight.intensity = 0.5; sunMesh.material.color.setHex(0xff4500);
                headlight1.intensity = 2; headlight2.intensity = 2;
            } else {
                currentColor.copy(nightColor);
                dirLight.intensity = 0.2; hemiLight.intensity = 0.3; sunMesh.material.color.setHex(0xffffff);
                headlight1.intensity = 5; headlight2.intensity = 5;
            }
            scene.background.copy(currentColor); scene.fog.color.copy(currentColor);
        }

        function updateClouds() {
            clouds.forEach(c => { c.position.x += c.userData.speed; if (c.position.x > 200) c.position.x = -200; });
        }

        function animate() {
            requestAnimationFrame(animate); let dt = clock.getDelta();
            if (state === 'menu') {
                updateMenu(dt);
            } else {
                updatePlayer(dt); updateCar(dt); updateNPCs(dt);
            }
            updateDialogues(dt); updateTrees(dt); updateDayNight(dt); updateClouds();
            renderer.render(scene, state === 'menu' ? menuCamera : camera);
        }
        function onWindowResize() { 
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); 
            menuCamera.aspect = window.innerWidth / window.innerHeight; menuCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); 
        }
        
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        init();
    </script>
</body>
</html>
